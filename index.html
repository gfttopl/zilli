<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zilli — Manuals</title>

  <style>
    :root{
      --bg:#07090d;
      --panel:#0b0f18;
      --panel2:#0f1626;
      --text:#eef2ff;
      --muted:#a6b0c3;
      --border:rgba(255,255,255,.10);
      --shadow: 0 18px 50px rgba(0,0,0,.55);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 600px at 20% -10%, rgba(99,102,241,.18), transparent 60%),
                  radial-gradient(900px 600px at 90% 10%, rgba(56,189,248,.12), transparent 55%),
                  var(--bg);
      color:var(--text);
    }

    .container{
      width:min(1120px, calc(100% - 40px));
      margin:0 auto;
    }

    /* topbar */
    .topbar{
      position:sticky; top:0; z-index:20;
      background: rgba(7,9,13,.70);
      backdrop-filter: blur(12px);
      border-bottom:1px solid var(--border);
    }
    .topbar__inner{
      height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }
    .brand{
      display:flex; align-items:center; gap:10px;
      font-weight:750;
      letter-spacing:-.02em;
    }
    .pill{
      border:1px solid var(--border);
      background: rgba(255,255,255,.05);
      border-radius:999px;
      padding:8px 12px;
      color:var(--text);
    }

    .right{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .lang{
      display:flex;
      gap:8px;
      align-items:center;
      padding:6px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius:999px;
    }
    .lang button{
      border:1px solid transparent;
      background: transparent;
      color: var(--muted);
      padding:8px 10px;
      border-radius:999px;
      cursor:pointer;
      font-size:13px;
    }
    .lang button:hover{ color: var(--text); background: rgba(255,255,255,.06); }
    .lang button.active{
      color: var(--text);
      border-color: var(--border);
      background: rgba(255,255,255,.08);
    }

    /* hero */
    .hero{ padding:56px 0 18px; }
    .title{
      margin:0;
      font-size:52px;
      line-height:1.05;
      letter-spacing:-.04em;
    }
    .subtitle{
      margin:14px 0 0;
      color:var(--muted);
      font-size:16px;
      max-width:680px;
    }
    @media (max-width:620px){
      .title{font-size:40px}
      .subtitle{font-size:15px}
    }

    /* search */
    .search{ margin:18px 0 26px; }
    .search__box{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:999px;
      background: rgba(255,255,255,.05);
      box-shadow: var(--shadow);
    }
    .search__icon{
      font-size:14px;
      color: var(--muted);
      padding:6px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      background: rgba(0,0,0,.20);
    }
    .search__input{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      color: var(--text);
      font-size:15px;
    }
    .search__clear{
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius:999px;
      padding:8px 12px;
      cursor:pointer;
    }
    .search__clear:hover{ background: rgba(255,255,255,.10); }
    .search__meta{
      margin-top:10px;
      display:flex;
      gap:10px;
      align-items:center;
      color:var(--muted);
      font-size:13px;
      flex-wrap:wrap;
    }
    .dot{opacity:.6}

    /* grid cards */
    .grid{ padding-bottom:70px; }
    .cards{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:14px;
    }
    @media (max-width:980px){ .cards{grid-template-columns:repeat(2,1fr)} }
    @media (max-width:620px){ .cards{grid-template-columns:1fr} }

    .card{
      border:1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: 0 12px 30px rgba(0,0,0,.38);
      padding:16px;
      cursor:pointer;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
      position:relative;
      overflow:hidden;
    }
    .card:hover{
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.18);
      box-shadow: 0 20px 55px rgba(0,0,0,.55);
    }
    .card::after{
      content:"";
      position:absolute;
      inset:-80px -120px auto auto;
      width:220px;
      height:220px;
      background: radial-gradient(circle at 30% 30%, rgba(99,102,241,.35), transparent 60%);
      transform: rotate(15deg);
      pointer-events:none;
      opacity:.7;
    }

    .card__top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      position:relative;
      z-index:1;
    }
    .card__name{
      margin:0;
      font-weight:800;
      letter-spacing:-.02em;
      font-size:16px;
    }
    .badges{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .badge{
      font-size:12px;
      color: var(--muted);
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:999px;
      background: rgba(0,0,0,.20);
      white-space:nowrap;
    }
    .card__desc{
      margin:10px 0 14px;
      color: var(--muted);
      font-size:13.5px;
      line-height:1.35;
      min-height:38px;
      position:relative;
      z-index:1;
    }
    .card__bottom{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      position:relative;
      z-index:1;
    }
    .hint{
      display:flex;
      align-items:center;
      gap:8px;
      color: var(--muted);
      font-size:13px;
    }
    .hint__dot{
      width:9px;
      height:9px;
      border-radius:999px;
      background: rgba(255,255,255,.28);
    }
    .open{
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius:999px;
      padding:8px 10px;
      font-size:13px;
    }

    .empty{
      color: var(--muted);
      border:1px solid var(--border);
      background: rgba(255,255,255,.05);
      border-radius:999px;
      padding:10px 14px;
      display:inline-block;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <div class="brand">
        <span class="pill">Zilli</span>
        <span id="navLabel" class="pill" style="color:var(--muted);">Manuals</span>
      </div>

      <div class="right">
        <div class="lang" aria-label="Language switch">
          <button id="btnEN" class="active" type="button">EN</button>
          <button id="btnUA" type="button">UA</button>
          <button id="btnRU" type="button">RU</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 id="title" class="title">Manuals</h1>
      <p id="subtitle" class="subtitle">A clean catalog so clients instantly know where to find each manual.</p>
    </section>

    <section class="search">
      <div class="search__box">
        <span class="search__icon">⌘</span>
        <input id="searchInput" class="search__input" type="text" placeholder="Search manuals..." autocomplete="off" />
        <button id="clearBtn" class="search__clear" type="button">Clear</button>
      </div>
      <div class="search__meta">
        <span id="countLabel">0 results</span>
        <span class="dot">•</span>
        <span id="clickHint">Click a card to open</span>
      </div>
    </section>

    <section class="grid">
      <div id="cards" class="cards"></div>
      <div id="empty" class="empty" style="display:none;"></div>
    </section>
  </main>

  <script>
    // ====== i18n ======
    const I18N = {
      en: {
        nav: "Manuals",
        title: "Manuals",
        subtitle: "A clean catalog so clients instantly know where to find each manual.",
        searchPH: "Search manuals...",
        clear: "Clear",
        results: (n)=> `${n} result${n===1?"":"s"}`,
        click: "Click a card to open",
        empty: "No manuals match your search."
      },
      ua: {
        nav: "Мануали",
        title: "Мануали",
        subtitle: "Охайний каталог, щоб клієнти одразу бачили, де потрібний мануал.",
        searchPH: "Пошук мануалів...",
        clear: "Очистити",
        results: (n)=> `${n} результат${(n%10===1 && n%100!==11)?"":"(ів)"}`,
        click: "Натисни на картку, щоб відкрити",
        empty: "Нічого не знайдено за вашим запитом."
      },
      ru: {
        nav: "Мануалы",
        title: "Мануалы",
        subtitle: "Аккуратный каталог, чтобы клиентам сразу было понятно, где какой мануал.",
        searchPH: "Поиск мануалов...",
        clear: "Очистить",
        results: (n)=> `${n} результат${(n%10===1 && n%100!==11)?"":"ов"}`,
        click: "Нажми на карточку, чтобы открыть",
        empty: "По запросу ничего не найдено."
      }
    };

    let lang = localStorage.getItem("zilli_lang") || "en";

    // ====== DATA (Ты просто пропишешь пути к уже существующим HTML) ======
    // href -> путь к твоему готовому html файлу мануала
    const MANUALS = [
      {
        id: "admin-bot",
        title: { en:"Admin Bot", ua:"Бот-адмін", ru:"Бот админ" },
        desc:  { en:"Removes bad words and ads. Chat moderation.",
                 ua:"Видаляє погані слова та рекламу. Модерація чату.",
                 ru:"Удаляет плохие слова и рекламу. Модерация чата." },
        badges: ["Python", "Moderation"],
        href: "manuals/admin-bot.html"  
      },
      {
        id: "filter-bot",
        title: { en:"Filter Bot", ua:"Бот-фільтр", ru:"Бот фильтр" },
        desc:  { en:"Acts like a manager: answers, clarifies, guides.",
                 ua:"Працює як менеджер: відповідає, уточнює, веде по кроках.",
                 ru:"Работает как менеджер: отвечает, уточняет, ведёт по шагам." },
        badges: ["Python", "Manager"],
        href: "manuals/filterbot.html" 
      },
      {
        id: "shaurma-order-bot",
        title: {en: "Shaurma Order Bot — Overview", ua: "Бот замовлення шаурми — Огляд", ru: "Бот заказа шаурмы — Обзор"},
        desc: {
                 en: "Quick overview + how to order, promos, cart, and contacts.",
                 ua: "Швидкий огляд: як замовити, акції, кошик і контакти.",
                 ru: "Быстрый обзор: как заказать, акции, корзина и контакты."},
        badges: ["Docs", "Guide", "Pickup"],
        href: "manuals/shawarma_bot_manual.html"
      }
    ];

    // ====== UI refs ======
    const navLabel = document.getElementById("navLabel");
    const titleEl = document.getElementById("title");
    const subtitleEl = document.getElementById("subtitle");
    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const countLabel = document.getElementById("countLabel");
    const clickHint = document.getElementById("clickHint");
    const cardsEl = document.getElementById("cards");
    const emptyEl = document.getElementById("empty");

    const btnEN = document.getElementById("btnEN");
    const btnUA = document.getElementById("btnUA");
    const btnRU = document.getElementById("btnRU");

    function setLang(next){
      lang = next;
      localStorage.setItem("zilli_lang", lang);

      btnEN.classList.toggle("active", lang==="en");
      btnUA.classList.toggle("active", lang==="ua");
      btnRU.classList.toggle("active", lang==="ru");

      const t = I18N[lang];
      navLabel.textContent = t.nav;
      titleEl.textContent = t.title;
      subtitleEl.textContent = t.subtitle;
      searchInput.placeholder = t.searchPH;
      clearBtn.textContent = t.clear;
      clickHint.textContent = t.click;

      render();
    }

    function esc(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function getTitle(m){ return (m.title && m.title[lang]) ? m.title[lang] : (m.title?.en || ""); }
    function getDesc(m){ return (m.desc && m.desc[lang]) ? m.desc[lang] : (m.desc?.en || ""); }

    function matches(m, q){
      if(!q) return true;
      const hay = `${getTitle(m)} ${getDesc(m)} ${(m.badges||[]).join(" ")}`.toLowerCase();
      return q.split(/\s+/).every(p => hay.includes(p));
    }

    function cardHTML(m){
      const badges = (m.badges||[]).slice(0,3).map(b=> `<span class="badge">${esc(b)}</span>`).join("");
      return `
        <article class="card" data-href="${esc(m.href)}" tabindex="0" role="link" aria-label="${esc(getTitle(m))}">
          <div class="card__top">
            <h3 class="card__name">${esc(getTitle(m))}</h3>
            <div class="badges">${badges}</div>
          </div>
          <p class="card__desc">${esc(getDesc(m))}</p>
          <div class="card__bottom">
            <div class="hint"><span class="hint__dot"></span><span>${esc(I18N[lang].nav.slice(0,-1) || "Manual")}</span></div>
            <span class="open">Open</span>
          </div>
        </article>
      `;
    }

    function render(){
      const q = (searchInput.value || "").trim().toLowerCase();
      const list = MANUALS.filter(m => matches(m, q));

      cardsEl.innerHTML = list.map(cardHTML).join("");

      countLabel.textContent = I18N[lang].results(list.length);

      if(list.length === 0){
        emptyEl.style.display = "inline-block";
        emptyEl.textContent = I18N[lang].empty;
      } else {
        emptyEl.style.display = "none";
      }
    }

    // interactions
    btnEN.addEventListener("click", ()=>setLang("en"));
    btnUA.addEventListener("click", ()=>setLang("ua"));
    btnRU.addEventListener("click", ()=>setLang("ru"));

    searchInput.addEventListener("input", ()=>render());
    clearBtn.addEventListener("click", ()=>{
      searchInput.value = "";
      render();
    });

    // click card -> navigate
    document.addEventListener("click", (e)=>{
      const card = e.target.closest(".card");
      if(!card) return;
      const href = card.getAttribute("data-href");
      if(href) window.location.href = href;
    });

    // keyboard open (Enter)
    document.addEventListener("keydown", (e)=>{
      if(e.key !== "Enter") return;
      const card = document.activeElement?.closest?.(".card");
      if(!card) return;
      const href = card.getAttribute("data-href");
      if(href) window.location.href = href;
    });

    // init
    setLang(lang);
  </script>
</body>
</html>
